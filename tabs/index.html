<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>YUG Tab Lines Generator</title>

  <style>
    :root{
      --bg:#0b0b0e;
      --panel:#13131a;
      --text:#f4f4f7;
      --muted:#b7b7c2;
      --accent:#5b21b6;
      --accent-2:#8b5cf6;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:radial-gradient(1200px 600px at 50% 0%, #141424, var(--bg));
      color:var(--text);
      min-height:100vh;
      padding:24px;
    }

    .topbar{
      width:min(1200px,100%);
      margin:0 auto 14px auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .brand{
      font-weight:800;
      letter-spacing:.5px;
      font-size:18px;
    }

    .home,
    .btn{
      text-decoration:none;
      color:#fff;
      padding:10px 14px;
      border-radius:12px;
      background:linear-gradient(180deg, rgba(91,33,182,0.95), rgba(91,33,182,0.75));
      border:1px solid rgba(255,255,255,0.12);
      font-weight:650;
      transition:transform .05s ease, box-shadow .15s ease;
      user-select:none;
      white-space:nowrap;
      cursor:pointer;
    }

    .home:active,
    .btn:active{
      transform:translateY(1px);
    }

    .btn.secondary{
      background:rgba(14,14,20,0.68);
      border:1px solid rgba(91,33,182,0.45);
      color:var(--text);
    }

    .btn:hover,
    .home:hover{
      box-shadow:0 0 0 3px rgba(91,33,182,0.22);
    }

    .wrap{
      width:min(1200px,100%);
      margin:0 auto;
      background:rgba(19,19,26,0.88);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      box-shadow:0 18px 60px rgba(0,0,0,0.45);
      padding:18px;
      backdrop-filter:blur(10px);
    }

    .yug-banner{
      width:100%;
      height:180px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 0 18px 0;
      background:linear-gradient(90deg, rgba(91,33,182,0.55) 0%, #000 18%, #000 82%, rgba(91,33,182,0.55) 100%);
      border-radius:16px;
      overflow:hidden;
      position:relative;
    }

    .yug-logo{
      height:215px;
      object-fit:contain;
      transition:transform .25s ease;
    }

    .yug-logo:hover{
      transform:scale(1.05);
    }

    .layout{
      display:grid;
      grid-template-columns:360px 1fr;
      gap:18px;
      align-items:start;
    }

    .panel{
      background:rgba(14,14,20,0.55);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:16px;
      padding:16px;
    }

    .panel h2{
      margin:0 0 14px;
      font-size:18px;
    }

    .row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:end;
      margin-bottom:14px;
    }

    .field{
      flex:1 1 150px;
    }

    .field.full{
      flex-basis:100%;
    }

    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin:0 0 6px;
    }

    input,
    select,
    textarea{
      background:rgba(14,14,20,0.70);
      border:1px solid rgba(91,33,182,0.45);
      color:var(--text);
      border-radius:12px;
      padding:10px 12px;
      outline:none;
      width:100%;
      font-size:14px;
      transition:border-color .15s ease, box-shadow .15s ease, background .15s ease;
    }

    input:hover,
    select:hover,
    textarea:hover{
      border-color:rgba(139,92,246,0.72);
      background:rgba(14,14,20,0.86);
    }

    input:focus,
    select:focus,
    textarea:focus{
      border-color:rgba(139,92,246,0.92);
      box-shadow:0 0 0 3px rgba(91,33,182,0.28);
      background:rgba(14,14,20,0.95);
    }

    textarea{
      min-height:210px;
      resize:vertical;
      font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      line-height:1.55;
    }

    .hint{
      font-size:12px;
      color:var(--muted);
      margin-top:6px;
      line-height:1.35;
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .editorWrap{
      overflow:auto;
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.10);
      background:#09090d;
      padding:14px;
    }

    .tabGrid{
      min-width:max-content;
    }

    .tabRow{
      display:grid;
      grid-template-columns:48px repeat(var(--steps), 40px);
      gap:6px;
      align-items:center;
      margin-bottom:8px;
    }

    .stringLabel{
      width:48px;
      height:40px;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      font-weight:800;
      color:#fff;
    }

    .cell{
      width:40px;
      height:40px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.08);
      background:#0f0f16;
      color:#fff;
      text-align:center;
      padding:0;
      font-weight:800;
      font-size:14px;
    }

    .cell:focus{
      background:#20143b;
      border-color:rgba(139,92,246,0.95);
      box-shadow:0 0 0 3px rgba(91,33,182,0.22);
      position:relative;
      z-index:2;
    }

    .bar-toggle{
      width:40px;
      height:24px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.10);
      background:rgba(255,255,255,0.04);
      color:var(--muted);
      font-size:11px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      user-select:none;
      margin:0 auto 4px auto;
    }

    .bar-toggle.active{
      background:rgba(91,33,182,0.28);
      border-color:rgba(139,92,246,0.75);
      color:#fff;
    }

    .barRow{
      display:grid;
      grid-template-columns:48px repeat(var(--steps), 40px);
      gap:6px;
      margin-bottom:10px;
      align-items:end;
    }

    .barSpacer{ height:1px; }

    .canvasWrap{
      background:#000;
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.10);
      padding:14px;
      display:flex;
      justify-content:center;
      overflow:auto;
    }

    canvas{
      max-width:100%;
      height:auto;
      image-rendering:crisp-edges;
    }

    @media (max-width:980px){
      .layout{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="brand">YUG • Tab Lines Generator</div>
    <a class="home" href="../">Accueil</a>
  </div>

  <div class="wrap">
    <div class="yug-banner">
      <img src="../yug-logo violet 3.png" alt="YUG logo" class="yug-logo">
    </div>

    <div class="layout">
      <section class="panel">
        <h2>Paramètres</h2>

        <div class="row">
          <div class="field">
            <label>Instrument</label>
            <select id="instrument">
              <option value="guitar">Guitare</option>
              <option value="bass">Basse</option>
            </select>
          </div>

          <div class="field">
            <label>Accordage preset</label>
            <select id="presetTuning"></select>
          </div>
        </div>

        <div class="row">
          <div class="field full">
            <label>Accordage personnalisé (de la corde aiguë vers la grave)</label>
            <input id="customTuning" value="e B G D A E" />
            <div class="hint">Exemples : <strong>e B G D A E</strong> pour guitare, <strong>G D A E</strong> pour basse 4 cordes.</div>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Titre</label>
            <input id="title" value="Idée tab" maxlength="50" />
          </div>

          <div class="field">
            <label>Colonnes</label>
            <input id="steps" type="number" min="4" max="64" value="16" />
          </div>
        </div>

        <div class="toolbar">
          <button class="btn" id="buildBtn">Créer / Refaire la grille</button>
          <button class="btn secondary" id="clearBtn">Vider</button>
          <button class="btn secondary" id="copyBtn">Copier la tab</button>
          <button class="btn" id="downloadPngBtn">Télécharger PNG</button>
        </div>
      </section>

      <section class="panel">
        <h2>Éditeur</h2>
        <div class="editorWrap">
          <div id="barRow" class="barRow"></div>
          <div id="tabGrid" class="tabGrid"></div>
        </div>
      </section>
    </div>

    <div class="layout" style="margin-top:18px;">
      <section class="panel">
        <h2>Tab ASCII</h2>
        <textarea id="asciiOutput" spellcheck="false"></textarea>
      </section>

      <section class="panel">
        <h2>Aperçu PNG</h2>
        <div class="canvasWrap">
          <canvas id="pngCanvas" width="1400" height="400"></canvas>
        </div>
      </section>
    </div>
  </div>

<script>
(() => {
  const instrumentEl = document.getElementById('instrument');
  const presetTuningEl = document.getElementById('presetTuning');
  const customTuningEl = document.getElementById('customTuning');
  const titleEl = document.getElementById('title');
  const stepsEl = document.getElementById('steps');
  const buildBtn = document.getElementById('buildBtn');
  const clearBtn = document.getElementById('clearBtn');
  const copyBtn = document.getElementById('copyBtn');
  const downloadPngBtn = document.getElementById('downloadPngBtn');
  const tabGrid = document.getElementById('tabGrid');
  const barRow = document.getElementById('barRow');
  const asciiOutput = document.getElementById('asciiOutput');
  const canvas = document.getElementById('pngCanvas');
  const ctx = canvas.getContext('2d');

  const TUNINGS = {
    guitar: [
      { label: 'Standard (E A D G B e)', value: 'e B G D A E' },
      { label: 'Drop D (D A D G B e)', value: 'e B G D A D' },
      { label: 'D Standard (D G C F A d)', value: 'd A F C G D' }
    ],
    bass: [
      { label: '4 cordes standard (E A D G)', value: 'G D A E' },
      { label: '4 cordes Drop D (D A D G)', value: 'G D A D' },
      { label: '5 cordes standard (B E A D G)', value: 'G D A E B' }
    ]
  };

  function populateTunings() {
    const instrument = instrumentEl.value;
    presetTuningEl.innerHTML = '';

    TUNINGS[instrument].forEach((preset, index) => {
      const opt = document.createElement('option');
      opt.value = preset.value;
      opt.textContent = preset.label;
      if (index === 0) opt.selected = true;
      presetTuningEl.appendChild(opt);
    });

    customTuningEl.value = presetTuningEl.value;
    buildGrid();
  }

  function getTuning() {
    return customTuningEl.value
      .trim()
      .split(/\s+/)
      .map(x => x.trim())
      .filter(Boolean);
  }

  function getStepCount() {
    return Math.max(4, Math.min(64, Number(stepsEl.value) || 16));
  }

  function sanitizeValue(value) {
    return (value || '')
      .replace(/[^0-9hHpP\/\\bBrRxX~]/g, '')
      .slice(0, 2);
  }

  function buildBarRow(totalSteps) {
    barRow.innerHTML = '';
    barRow.style.setProperty('--steps', totalSteps);

    const spacer = document.createElement('div');
    spacer.className = 'barSpacer';
    barRow.appendChild(spacer);

    for (let i = 0; i < totalSteps; i++) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'bar-toggle';
      btn.textContent = '|';
      btn.dataset.step = String(i);
      btn.dataset.active = '0';
      btn.addEventListener('click', () => {
        const next = btn.dataset.active === '1' ? '0' : '1';
        btn.dataset.active = next;
        btn.classList.toggle('active', next === '1');
        updateOutputs();
      });
      barRow.appendChild(btn);
    }
  }

  function buildGrid() {
    const tuning = getTuning();
    const totalSteps = getStepCount();

    tabGrid.innerHTML = '';
    tabGrid.style.setProperty('--steps', totalSteps);

    buildBarRow(totalSteps);

    tuning.forEach((stringName, rowIndex) => {
      const row = document.createElement('div');
      row.className = 'tabRow';
      row.style.setProperty('--steps', totalSteps);

      const label = document.createElement('div');
      label.className = 'stringLabel';
      label.textContent = stringName;
      row.appendChild(label);

      for (let step = 0; step < totalSteps; step++) {
        const input = document.createElement('input');
        input.className = 'cell';
        input.maxLength = 2;
        input.inputMode = 'text';
        input.value = '';
        input.dataset.row = String(rowIndex);
        input.dataset.step = String(step);

        input.addEventListener('input', () => {
          input.value = sanitizeValue(input.value);
          updateOutputs();
        });

        input.addEventListener('keydown', (e) => {
          const currentRow = Number(input.dataset.row);
          const currentStep = Number(input.dataset.step);
          const findCell = (r, s) => tabGrid.querySelector(`.cell[data-row="${r}"][data-step="${s}"]`);

          if (e.key === 'ArrowRight') {
            e.preventDefault();
            findCell(currentRow, Math.min(totalSteps - 1, currentStep + 1))?.focus();
          }
          if (e.key === 'ArrowLeft') {
            e.preventDefault();
            findCell(currentRow, Math.max(0, currentStep - 1))?.focus();
          }
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            findCell(Math.min(tuning.length - 1, currentRow + 1), currentStep)?.focus();
          }
          if (e.key === 'ArrowUp') {
            e.preventDefault();
            findCell(Math.max(0, currentRow - 1), currentStep)?.focus();
          }
        });

        row.appendChild(input);
      }

      tabGrid.appendChild(row);
    });

    updateOutputs();
  }

  function getBarPositions() {
    return Array.from(barRow.querySelectorAll('.bar-toggle'))
      .map((btn, index) => btn.dataset.active === '1' ? index : -1)
      .filter(index => index >= 0);
  }

  function buildAscii() {
    const tuning = getTuning();
    const totalSteps = getStepCount();
    const bars = new Set(getBarPositions());
    const lines = [];
    const title = titleEl.value.trim();

    tuning.forEach((stringName, rowIndex) => {
      let line = stringName.padEnd(2, ' ') + '|';

      for (let step = 0; step < totalSteps; step++) {
        const cell = tabGrid.querySelector(`.cell[data-row="${rowIndex}"][data-step="${step}"]`);
        const raw = sanitizeValue(cell?.value || '');
        line += raw ? raw.padEnd(2, '-') : '--';

        if (bars.has(step)) {
          line += '|';
        }
      }

      lines.push(line);
    });

    return (title ? title + '\n\n' : '') + lines.join('\n');
  }

  function drawPng() {
    const tuning = getTuning();
    const totalSteps = getStepCount();
    const bars = new Set(getBarPositions());
    const title = titleEl.value.trim();

    const marginX = 48;
    const startX = 110;
    const stepW = 54;
    const topY = title ? 92 : 58;
    const rowH = 58;
    const endX = startX + (totalSteps * stepW);
    const W = Math.max(1200, endX + 60);
    const H = topY + (tuning.length * rowH) + 50;

    canvas.width = W;
    canvas.height = H;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    if (title) {
      ctx.font = '700 34px system-ui, -apple-system, Segoe UI, Roboto, Arial';
      ctx.fillStyle = 'rgba(91,33,182,0.95)';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText(title, marginX, 52);
    }

    tuning.forEach((stringName, rowIndex) => {
      const y = topY + (rowIndex * rowH);

      ctx.font = '800 26px system-ui, -apple-system, Segoe UI, Roboto, Arial';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(stringName, 70, y);

      ctx.strokeStyle = 'rgba(255,255,255,0.32)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(startX, y);
      ctx.lineTo(endX, y);
      ctx.stroke();

      for (let step = 0; step < totalSteps; step++) {
        const x = startX + (step * stepW) + stepW / 2;
        const cell = tabGrid.querySelector(`.cell[data-row="${rowIndex}"][data-step="${step}"]`);
        const raw = sanitizeValue(cell?.value || '');

        if (raw) {
          ctx.fillStyle = '#000';
          const boxW = raw.length === 2 ? 34 : 24;
          const boxH = 28;
          ctx.fillRect(x - boxW / 2, y - boxH / 2, boxW, boxH);

          ctx.font = '800 24px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace';
          ctx.fillStyle = '#fff';
          ctx.fillText(raw, x, y + 1);
        }
      }
    });

    bars.forEach((step) => {
      const x = startX + ((step + 1) * stepW);
      ctx.strokeStyle = 'rgba(139,92,246,0.78)';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(x, topY - 24);
      ctx.lineTo(x, topY + ((tuning.length - 1) * rowH) + 24);
      ctx.stroke();
    });

    ctx.textAlign = 'right';
    ctx.font = '600 14px system-ui, -apple-system, Segoe UI, Roboto, Arial';
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillText('YUG • tab', W - 18, H - 18);
  }

  function updateOutputs() {
    const ascii = buildAscii();
    asciiOutput.value = ascii;
    drawPng();
  }

  function clearGrid() {
    tabGrid.querySelectorAll('.cell').forEach(cell => {
      cell.value = '';
    });

    barRow.querySelectorAll('.bar-toggle').forEach(btn => {
      btn.dataset.active = '0';
      btn.classList.remove('active');
    });

    updateOutputs();
  }

  function copyAscii() {
    navigator.clipboard.writeText(asciiOutput.value).catch(() => {});
  }

  function downloadPng() {
    drawPng();
    const a = document.createElement('a');
    a.download = 'yug-tab.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  }

  instrumentEl.addEventListener('change', populateTunings);
  presetTuningEl.addEventListener('change', () => {
    customTuningEl.value = presetTuningEl.value;
    buildGrid();
  });
  customTuningEl.addEventListener('input', buildGrid);
  titleEl.addEventListener('input', updateOutputs);
  stepsEl.addEventListener('change', buildGrid);
  buildBtn.addEventListener('click', buildGrid);
  clearBtn.addEventListener('click', clearGrid);
  copyBtn.addEventListener('click', copyAscii);
  downloadPngBtn.addEventListener('click', downloadPng);

  populateTunings();
})();
</script>
</body>
</html>
