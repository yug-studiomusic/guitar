<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>YUG • Chord PNG Generator</title>

  <style>
    :root{
      --bg:#0b0b0e;
      --panel:#13131a;
      --text:#f4f4f7;
      --muted:#b7b7c2;
      --line:#e8e6df;
      --dot:#e8e6df;
      --btn:#1f1f2a;
      --btn2:#2a2a3a;
      --accent:#5b21b6;
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background: radial-gradient(1200px 600px at 50% 0%, #141424, var(--bg));
      color:var(--text);
      min-height:100vh;
      padding:24px;
    }

    .topbar{
      width:min(1100px, 100%);
      margin:0 auto 14px auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .brand{
      font-weight:800;
      letter-spacing:.5px;
      font-size:18px;
    }

    .home{
      text-decoration:none;
      color:#fff;
      padding:10px 14px;
      border-radius:12px;
      background:linear-gradient(180deg, rgba(91,33,182,0.95), rgba(91,33,182,0.75));
      border:1px solid rgba(255,255,255,0.12);
      font-weight:700;
      transition:transform .05s ease;
      white-space:nowrap;
    }

    .home:active{
      transform:translateY(1px);
    }

    .wrap{
      width:min(1100px, 100%);
      margin:0 auto;
      background:rgba(19,19,26,0.85);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      box-shadow:0 18px 60px rgba(0,0,0,0.45);
      padding:18px;
      backdrop-filter:blur(10px);
    }

    .yug-banner{
      width:100%;
      height:180px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 0 18px 0;
      background:
        linear-gradient(90deg,
          rgba(91,33,182,0.55) 0%,
          #000 18%,
          #000 82%,
          rgba(91,33,182,0.55) 100%
        );
      border-radius:16px;
      overflow:hidden;
      position:relative;
    }

    .yug-logo{
      height:215px;
      object-fit:contain;
      filter:none;
      transition:transform 0.25s ease;
    }

    .yug-logo:hover{
      transform:scale(1.05);
    }

    .main{
      display:grid;
      grid-template-columns:420px 1fr;
      gap:18px;
    }

    @media (max-width:980px){
      .main{grid-template-columns:1fr}
      .yug-banner{height:130px}
      .yug-logo{height:150px}
    }

    .card{
      background:rgba(19,19,26,.9);
      border:1px solid rgba(255,255,255,.06);
      border-radius:var(--radius);
      padding:16px;
      box-shadow:0 8px 24px rgba(0,0,0,.35);
    }

    .card h2{
      margin:0 0 10px 0;
      font-size:14px;
      color:var(--muted);
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.12em;
    }

    .grid2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin:6px 0;
    }

    input, select{
      width:100%;
      padding:10px 12px;
      background:rgba(14,14,20,0.70);
      border:1px solid rgba(91,33,182,0.45);
      color:var(--text);
      border-radius:12px;
      outline:none;
      font-size:14px;
      transition:border-color .15s ease, box-shadow .15s ease, background .15s ease;
    }

    input:hover, select:hover{
      border-color:rgba(139,92,246,0.72);
      background:rgba(14,14,20,0.86);
    }

    input:focus, select:focus{
      border-color:rgba(139,92,246,0.92);
      box-shadow:0 0 0 3px rgba(91,33,182,0.28);
      background:rgba(14,14,20,0.95);
    }

    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .btn{
      background:rgba(14,14,20,0.65);
      border:1px solid rgba(91,33,182,0.45);
      color:var(--text);
      border-radius:12px;
      padding:10px 14px;
      cursor:pointer;
      font-weight:650;
      transition:border-color .15s ease, box-shadow .15s ease, background .15s ease, transform .05s ease;
      user-select:none;
      white-space:nowrap;
    }

    .btn:hover{
      border-color:rgba(139,92,246,0.78);
      box-shadow:0 0 0 3px rgba(91,33,182,0.22);
      background:rgba(14,14,20,0.86);
    }

    .btn:active{
      transform:translateY(1px);
    }

    .btn.primary{
      background:linear-gradient(180deg, rgba(91,33,182,0.95), rgba(91,33,182,0.75));
      border:1px solid rgba(255,255,255,0.12);
      color:#fff;
      box-shadow:none;
    }

    .help{
      margin-top:10px;
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
    }

    .kbd{
      background:rgba(255,255,255,0.06);
      padding:2px 6px;
      border-radius:8px;
      color:#fff;
      border:1px solid rgba(255,255,255,0.10);
    }

    .canvasWrap{
      background:#000;
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.10);
      padding:14px;
      display:flex;
      justify-content:center;
      overflow:auto;
    }

    canvas{
      max-width:100%;
      height:auto;
      display:block;
    }

    .small{
      font-size:12px;
      color:var(--muted);
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="brand">YUG • Chord PNG Generator</div>
    <a class="home" href="../">Accueil</a>
  </div>

  <div class="wrap">
    <div class="yug-banner">
      <img src="../yug-logo violet 3.png" alt="YUG logo" class="yug-logo">
    </div>

    <div class="main">
      <section class="card">
        <h2>Éditeur</h2>

        <div class="grid2">
          <div>
            <label>Nom de l’accord</label>
            <input id="chordName" value="A" placeholder="Ex: Bbm, F#m, C" />
          </div>
          <div>
            <label>Frette de départ</label>
            <input id="startFret" type="number" min="1" max="24" value="1" />
          </div>
          <div>
            <label>Nombre de frettes</label>
            <input id="numFrets" type="number" min="3" max="8" value="5" />
          </div>
          <div>
            <label>Nombre de cordes</label>
            <input id="numStrings" type="number" min="4" max="8" value="6" />
          </div>
        </div>

        <div class="row" style="margin-top:12px">
          <button class="btn" id="resetBtn">Reset</button>
          <button class="btn" id="exampleABtn">Exemple A</button>
          <button class="btn" id="exampleBbmBtn">Exemple Bbm</button>
        </div>

        <div class="row" style="margin-top:12px">
          <label style="margin:0; min-width:220px">
            <span class="small">Fond :</span>
            <select id="bgMode">
              <option value="black">Noir</option>
              <option value="transparent">Transparent</option>
            </select>
          </label>

          <label style="margin:0; min-width:220px">
            <span class="small">Taille export :</span>
            <select id="exportSize">
              <option value="1080">1080px</option>
              <option value="720">720px</option>
              <option value="512">512px</option>
            </select>
          </label>
        </div>

        <div class="help">
          <b>Point</b> : clic = ajoute / enlève.<br/>
          <b>Numéros</b> : <span class="kbd">Shift</span> + clic = 1→2→3→4→vide (sur point ou barré).<br/>
          <b>Open/Mute</b> : clic au-dessus des cordes = o → x → rien.<br/>
          <b>Barré</b> : <span class="kbd">Shift</span> + clic (ancre) puis <span class="kbd">Shift</span> + clic (même frette).
        </div>
      </section>

      <section class="card">
        <h2>Résultat</h2>
        <div class="previewWrap">
          <div class="canvasWrap">
            <canvas id="cv" width="1080" height="1350"></canvas>
          </div>

          <div class="row">
            <button class="btn primary" id="downloadBtn">Télécharger PNG</button>
            <button class="btn" id="copyBtn">Copier PNG</button>
          </div>

          <div class="small" id="status"></div>
        </div>
      </section>
    </div>
  </div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);

  const cv = $("cv");
  const ctx = cv.getContext("2d");

  const chordNameEl = $("chordName");
  const startFretEl = $("startFret");
  const numFretsEl  = $("numFrets");
  const numStringsEl= $("numStrings");
  const bgModeEl    = $("bgMode");
  const exportSizeEl= $("exportSize");
  const statusEl    = $("status");

  const state = {
    chordName: "A",
    startFret: 1,
    numFrets: 5,
    numStrings: 6,
    bgMode: "black",
    markers: Array(6).fill(null),
    dots: [],
    barres: [],
    barreAnchor: null
  };

  function clamp(n,a,b){ return Math.max(a, Math.min(b,n)); }

  function syncStateFromInputs(){
    state.chordName = chordNameEl.value.trim() || "Chord";
    state.startFret = clamp(parseInt(startFretEl.value || "1", 10), 1, 24);
    state.numFrets  = clamp(parseInt(numFretsEl.value || "5", 10), 3, 8);

    const ns = clamp(parseInt(numStringsEl.value || "6", 10), 4, 8);
    if(ns !== state.numStrings){
      state.numStrings = ns;
      state.markers = Array(ns).fill(null);
      state.dots = state.dots.filter(d => d.s < ns);
      state.barres = state.barres.filter(b => b.s1 < ns && b.s2 < ns);
      state.barreAnchor = null;
    }

    state.bgMode = bgModeEl.value;
  }

  function cycleNumber(n){
    if(n == null) return 1;
    if(n >= 4) return null;
    return n + 1;
  }

  function findDot(s,f){
    return state.dots.findIndex(d => d.s===s && d.f===f);
  }

  function findBarre(f,s1,s2){
    return state.barres.findIndex(b =>
      b.f===f && (
        (b.s1===s1 && b.s2===s2) ||
        (b.s1===s2 && b.s2===s1)
      )
    );
  }

  function roundRect(ctx, x, y, w, h, r){
    const rr = Math.min(r, h/2, w/2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
  }

  function geom(){
    const W = cv.width, H = cv.height;
    const boxW = Math.round(W * 0.62);
    const boxH = Math.round(H * 0.58);
    const left = Math.round((W - boxW) / 2);
    const top  = Math.round(H * 0.30);
    const right = left + boxW;
    const bottom = top + boxH;

    const strings = state.numStrings;
    const frets = state.numFrets;
    const markerY = top - Math.round(H * 0.06);
    const bandTop = markerY - Math.round(H * 0.05);
    const bandBottom = top - Math.round(H * 0.01);

    return {W,H,boxW,boxH,left,top,right,bottom,strings,frets,markerY,bandTop,bandBottom};
  }

  function draw(){
    const size = parseInt(exportSizeEl.value, 10);
    cv.width = size;
    cv.height = Math.round(size * 1.25);

    const g = geom();
    const {W,H,left,top,right,bottom,boxW,boxH,strings,frets,markerY} = g;

    ctx.clearRect(0,0,W,H);
    if(state.bgMode === "black"){
      ctx.fillStyle = "#0b0b0e";
      ctx.fillRect(0,0,W,H);
    }

    const line = "#e8e6df";
    const dot  = "#e8e6df";
    const bg   = "#0b0b0e";

    ctx.fillStyle = line;
    ctx.font = `900 ${Math.round(W*0.12)}px system-ui, -apple-system, Segoe UI, Roboto, Arial`;
    ctx.textAlign = "center";
    ctx.textBaseline = "top";
    ctx.fillText(state.chordName, W/2, Math.round(H*0.08));

    ctx.strokeStyle = line;
    ctx.lineWidth = Math.max(2, Math.round(W*0.004));
    ctx.strokeRect(left, top, boxW, boxH);

    for(let s=1; s<strings-1; s++){
      const x = left + (boxW/(strings-1))*s;
      ctx.beginPath();
      ctx.moveTo(x, top);
      ctx.lineTo(x, bottom);
      ctx.stroke();
    }

    for(let f=1; f<frets; f++){
      const y = top + (boxH/frets)*f;
      ctx.beginPath();
      ctx.moveTo(left, y);
      ctx.lineTo(right, y);
      ctx.stroke();
    }

    if(state.startFret === 1){
      ctx.lineWidth = Math.max(5, Math.round(W*0.01));
      ctx.beginPath();
      ctx.moveTo(left, top);
      ctx.lineTo(right, top);
      ctx.stroke();
      ctx.lineWidth = Math.max(2, Math.round(W*0.004));
    } else {
      ctx.fillStyle = line;
      ctx.font = `800 ${Math.round(W*0.055)}px system-ui`;
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText(String(state.startFret), left - Math.round(W*0.06), top + (boxH/frets)/2);
    }

    ctx.fillStyle = line;
    ctx.font = `800 ${Math.round(W*0.07)}px system-ui`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    for(let s=0; s<strings; s++){
      const x = left + (boxW/(strings-1))*s;
      const m = state.markers[s];
      if(m === "open"){
        ctx.lineWidth = Math.max(3, Math.round(W*0.006));
        ctx.beginPath();
        ctx.arc(x, markerY, Math.round(W*0.018), 0, Math.PI*2);
        ctx.strokeStyle = line;
        ctx.stroke();
        ctx.lineWidth = Math.max(2, Math.round(W*0.004));
      } else if(m === "mute"){
        ctx.fillText("x", x, markerY);
      }
    }

    const cellH = boxH / frets;
    const rDot  = Math.round(W*0.032);
    const barreH = Math.round(rDot * 1.25);

    for(const b of state.barres){
      const y = top + cellH*(b.f - 0.5);
      const sMin = Math.min(b.s1, b.s2);
      const sMax = Math.max(b.s1, b.s2);

      const x1 = left + (boxW/(strings-1))*sMin;
      const x2 = left + (boxW/(strings-1))*sMax;

      const pad = rDot;
      const x = x1 - pad;
      const w = (x2 - x1) + pad*2;

      ctx.fillStyle = dot;
      roundRect(ctx, x, y - barreH/2, w, barreH, barreH/2);
      ctx.fill();

      if(b.n != null){
        ctx.fillStyle = bg;
        ctx.font = `900 ${Math.round(W*0.05)}px system-ui`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(String(b.n), x + w/2, y+1);
      }
    }

    for(const d of state.dots){
      const x = left + (boxW/(strings-1))*d.s;
      const y = top + cellH*(d.f - 0.5);

      ctx.fillStyle = dot;
      ctx.beginPath();
      ctx.arc(x, y, rDot, 0, Math.PI*2);
      ctx.fill();

      if(d.n != null){
        ctx.fillStyle = bg;
        ctx.font = `900 ${Math.round(W*0.05)}px system-ui`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(String(d.n), x, y+1);
      }
    }

    statusEl.textContent =
      `Accord: ${state.chordName} • ${strings} cordes • ${frets} frettes` +
      (state.barreAnchor ? " • (Barré: sélection en cours…)" : "");
  }

  function hitTest(mx,my){
    const g = geom();
    const {left,top,right,bottom,boxW,strings,frets,bandTop,bandBottom} = g;

    if(my >= bandTop && my <= bandBottom && mx >= left && mx <= right){
      const relX = mx - left;
      const sFloat = relX / (boxW/(strings-1));
      const s = Math.round(sFloat);
      return {type:"band", s};
    }

    if(mx < left || mx > right || my < top || my > bottom) return null;

    const relX = mx - left;
    const relY = my - top;

    const sFloat = relX / (boxW/(strings-1));
    const s = Math.round(sFloat);
    const f = Math.floor(relY / ((bottom-top)/frets)) + 1;

    return {type:"cell", s, f};
  }

  function cycleMarker(m){
    if(m == null) return "open";
    if(m === "open") return "mute";
    return null;
  }

  cv.addEventListener("click", (e) => {
    syncStateFromInputs();

    const rect = cv.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (cv.width / rect.width);
    const my = (e.clientY - rect.top) * (cv.height / rect.height);

    const hit = hitTest(mx,my);
    if(!hit) return;

    if(hit.type === "band"){
      state.markers[hit.s] = cycleMarker(state.markers[hit.s]);
      draw();
      return;
    }

    const s = hit.s;
    const f = hit.f;

    if(e.shiftKey){
      const dotIdx = findDot(s,f);

      if(dotIdx >= 0){
        state.dots[dotIdx].n = cycleNumber(state.dots[dotIdx].n);
        draw();
        return;
      }

      if(!state.barreAnchor){
        state.barreAnchor = {s,f};
        draw();
        return;
      }

      const a = state.barreAnchor;

      if(a.f !== f){
        state.barreAnchor = {s,f};
        draw();
        return;
      }

      const idx = findBarre(f, a.s, s);
      if(idx >= 0){
        state.barres[idx].n = cycleNumber(state.barres[idx].n);
      } else {
        state.barres.push({f, s1:a.s, s2:s, n:1});
      }

      state.barreAnchor = null;
      draw();
      return;
    }

    state.barreAnchor = null;

    const idx = findDot(s,f);
    if(idx >= 0){
      state.dots.splice(idx,1);
    } else {
      state.dots.push({s,f,n:null});
    }

    draw();
  });

  $("resetBtn").addEventListener("click", () => {
    syncStateFromInputs();
    state.dots = [];
    state.barres = [];
    state.barreAnchor = null;
    state.markers = Array(state.numStrings).fill(null);
    draw();
  });

  $("exampleABtn").addEventListener("click", () => {
    chordNameEl.value = "A";
    startFretEl.value = 1;
    numFretsEl.value = 5;
    numStringsEl.value = 6;
    syncStateFromInputs();

    state.dots = [
      {s:2,f:2,n:null},
      {s:3,f:2,n:null},
      {s:4,f:2,n:null},
    ];
    state.barres = [];
    state.barreAnchor = null;
    state.markers = Array(6).fill(null);
    state.markers[0] = "mute";
    state.markers[1] = "open";
    state.markers[5] = "open";
    draw();
  });

  $("exampleBbmBtn").addEventListener("click", () => {
    chordNameEl.value = "Bbm";
    startFretEl.value = 1;
    numFretsEl.value = 5;
    numStringsEl.value = 6;
    syncStateFromInputs();

    state.dots = [
      {s:2,f:3,n:null},
      {s:3,f:3,n:null},
      {s:4,f:2,n:null},
    ];
    state.barres = [
      {f:1,s1:1,s2:5,n:1}
    ];
    state.barreAnchor = null;
    state.markers = Array(6).fill(null);
    state.markers[0] = "mute";
    draw();
  });

  [chordNameEl,startFretEl,numFretsEl,numStringsEl,bgModeEl,exportSizeEl].forEach(el => {
    el.addEventListener("input", () => {
      syncStateFromInputs();
      draw();
    });
    el.addEventListener("change", () => {
      syncStateFromInputs();
      draw();
    });
  });

  $("downloadBtn").addEventListener("click", () => {
    syncStateFromInputs();
    draw();
    cv.toBlob((blob) => {
      if(!blob) return;
      const a = document.createElement("a");
      const safeName = (state.chordName || "chord").replace(/[^\w\-]+/g,"_");
      a.href = URL.createObjectURL(blob);
      a.download = `${safeName}.png`;
      a.click();
      URL.revokeObjectURL(a.href);
    }, "image/png");
  });

  $("copyBtn").addEventListener("click", async () => {
    try{
      syncStateFromInputs();
      draw();
      const blob = await new Promise(res => cv.toBlob(res, "image/png"));
      await navigator.clipboard.write([
        new ClipboardItem({"image/png": blob})
      ]);
      statusEl.textContent = "✅ PNG copié dans le presse-papiers";
    }catch(err){
      statusEl.textContent = "❌ Clipboard non supporté — utilise Télécharger PNG";
    }
  });

  syncStateFromInputs();
  $("exampleABtn").click();
})();
</script>
</body>
</html>
