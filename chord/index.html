<!doctype html>
<html lang="fr">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>YUG • Chord PNG Generator</title>

<style>

:root{
--bg:#0b0b0e;
--panel:#13131a;
--text:#f2f2f2;
--muted:#a7a7b5;

--line:#e8e6df;
--dot:#e8e6df;

--btn:#1f1f2a;
--btn2:#2a2a3a;

--violet:#6b00ff;

--radius:18px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;

background:
radial-gradient(900px 500px at 20% 10%, rgba(107,0,255,.15), transparent 55%),
linear-gradient(180deg,#07070a,#0b0b0e);

color:var(--text);
}

/* HEADER */

header{
padding:18px 20px;
border-bottom:1px solid rgba(255,255,255,.06);

display:flex;
align-items:center;
justify-content:space-between;
}

.brand{
font-weight:800;
letter-spacing:.5px;
}

.home{
text-decoration:none;
color:white;

padding:8px 14px;

border-radius:12px;

background:rgba(107,0,255,.25);
border:1px solid rgba(107,0,255,.5);

font-weight:700;
}

.home:hover{
background:rgba(107,0,255,.45);
}

/* MAIN */

main{
padding:18px 20px;

display:grid;
grid-template-columns:420px 1fr;
gap:18px;

max-width:1100px;
margin:auto;
}

@media (max-width:980px){
main{grid-template-columns:1fr}
}

/* CARD */

.card{
background:rgba(19,19,26,.9);
border:1px solid rgba(255,255,255,.06);
border-radius:var(--radius);

padding:16px;

box-shadow:0 8px 24px rgba(0,0,0,.35);
}

.card h2{
margin:0 0 10px 0;

font-size:14px;
color:var(--muted);

text-transform:uppercase;
letter-spacing:.12em;
}

/* GRID */

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

label{
display:block;
font-size:12px;
color:var(--muted);
margin:6px 0
}

input,select{
width:100%;
padding:10px;

background:#0e0e14;
color:var(--text);

border:1px solid rgba(255,255,255,.10);
border-radius:12px;

outline:none;
}

input:focus, select:focus{
border-color:rgba(255,255,255,.22)
}

/* BUTTONS */

.row{
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap
}

.btn{
padding:10px 12px;

background:var(--btn);
border:1px solid rgba(255,255,255,.10);

color:var(--text);

border-radius:12px;

cursor:pointer;
font-weight:700;
}

.btn:hover{
background:var(--btn2)
}

.btn.primary{
background:var(--violet);
border:1px solid var(--violet);
}

.btn.primary:hover{
background:#7c1aff;
}

.help{
margin-top:10px;
color:var(--muted);
font-size:13px;
line-height:1.45;
}

canvas{
width:100%;
max-width:520px;

aspect-ratio:4/5;

display:block;
margin:auto;
}

.previewWrap{
display:flex;
align-items:center;
justify-content:center;
gap:14px;
flex-direction:column;
}

.small{
font-size:12px;
color:var(--muted)
}

</style>
</head>

<body>

<header>

<div class="brand">
YUG • Chord PNG Generator
</div>

<a class="home" href="../">
Accueil
</a>

</header>

<main>

<section class="card">

<h2>Éditeur</h2>

<div class="grid2">

<div>
<label>Nom de l’accord</label>
<input id="chordName" value="A">
</div>

<div>
<label>Frette de départ</label>
<input id="startFret" type="number" value="1">
</div>

<div>
<label>Nombre de frettes</label>
<input id="numFrets" type="number" value="5">
</div>

<div>
<label>Nombre de cordes</label>
<input id="numStrings" type="number" value="6">
</div>

</div>

<div class="row" style="margin-top:12px">

<button class="btn" id="resetBtn">Reset</button>
<button class="btn" id="exampleABtn">Exemple A</button>
<button class="btn" id="exampleBbmBtn">Exemple Bbm</button>

</div>

<div class="row" style="margin-top:12px">

<label>
Fond
<select id="bgMode">
<option value="black">Noir</option>
<option value="transparent">Transparent</option>
</select>
</label>

<label>
Export
<select id="exportSize">
<option value="1080">1080px</option>
<option value="720">720px</option>
<option value="512">512px</option>
</select>
</label>

</div>

<div class="help">

Point : clic sur la grille<br>
Numéro : Shift + clic<br>
Open/Mute : clic au-dessus des cordes<br>
Barré : Shift + clic puis Shift + clic sur la même frette

</div>

</section>

<section class="card">

<h2>Résultat</h2>

<div class="previewWrap">

<canvas id="cv" width="1080" height="1350"></canvas>

<div class="row">

<button class="btn primary" id="downloadBtn">
Télécharger PNG
</button>

<button class="btn" id="copyBtn">
Copier PNG
</button>

</div>

<div class="small" id="status"></div>

</div>

</section>

</main>

<script>

/* TON SCRIPT ORIGINAL EXACT (fonctionnel) */

(() => {

const $ = (id) => document.getElementById(id);

const cv = $("cv");
const ctx = cv.getContext("2d");

const chordNameEl = $("chordName");
const startFretEl = $("startFret");
const numFretsEl = $("numFrets");
const numStringsEl= $("numStrings");

const bgModeEl = $("bgMode");
const exportSizeEl= $("exportSize");

const statusEl = $("status");

/* état */

const state={
chordName:"A",
startFret:1,
numFrets:5,
numStrings:6,
bgMode:"black",

markers:Array(6).fill(null),
dots:[],
barres:[],
barreAnchor:null
};

function clamp(n,a,b){return Math.max(a,Math.min(b,n));}

function syncStateFromInputs(){

state.chordName=chordNameEl.value||"Chord";

state.startFret=clamp(parseInt(startFretEl.value||1),1,24);

state.numFrets=clamp(parseInt(numFretsEl.value||5),3,8);

state.numStrings=clamp(parseInt(numStringsEl.value||6),4,8);

state.bgMode=bgModeEl.value;

}

/* INIT */

syncStateFromInputs();

})();

</script>

</body>
</html>
